events { worker_connections 1024; }

http {
 
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=meu_cache:10m max_size=1g inactive=60m use_temp_path=off;

    
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        # Bloqueio de segurança na camada do Proxy (Filtro de Conteúdo)
        if ($query_string ~* "([$]|select|insert|union|concat|<script>)") {
            return 403 "Acesso Negado: Atividade Maliciosa Detetada.";
        }

        location / {
            # Aplica o limite de requisições (máximo 5 por segundo por IP)
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://mauricioromaoapi:5000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_cache meu_cache;
            proxy_cache_valid 200 10m;
        }
    }
}
